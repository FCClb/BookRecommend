<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书推荐网站 · 注册</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <main class="container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h2>📝 用户注册</h2>
        <p class="auth-subtitle">创建账号，享受个性化图书推荐</p>

        <div class="form-error" id="formError"></div>
        <div class="form-success" id="formSuccess"></div>

        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" class="form-input" placeholder="2–20 个字符" autocomplete="username" required>
            <span class="field-error" id="usernameError"></span>
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" class="form-input" placeholder="至少 6 位密码" autocomplete="new-password" required>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" autocomplete="new-password" required>
            <span class="field-error" id="confirmError"></span>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">注 册</button>
        </form>

        <p class="auth-switch">已有账号？<a href="login.html">立即登录 →</a></p>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
