<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书推荐网站 · 登录</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <main class="container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h2>🔐 用户登录</h2>
        <p class="auth-subtitle">登录后可以收藏图书并查看个人中心</p>

        <div class="form-error" id="formError"></div>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
            <span class="field-error" id="usernameError"></span>
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
            <span class="field-error" id="passwordError"></span>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">登 录</button>
        </form>

        <p class="auth-switch">还没有账号？<a href="register.html">立即注册 →</a></p>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
