<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书推荐网站 · 后台管理</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <main class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <h1>📋 图书管理</h1>
      <p class="subtitle">管理图书信息：新增、编辑、删除</p>
    </div>

    <!-- 操作栏 -->
    <div class="admin-toolbar">
      <button class="btn btn-primary" id="addBtn">➕ 新增图书</button>
    </div>

    <!-- 图书表格 -->
    <div class="table-container" id="tableContainer">
      <div class="loading"><div class="spinner"></div><p>正在加载…</p></div>
    </div>
  </main>

  <!-- 新增/编辑模态框 -->
  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">新增图书</h3>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-error" id="formError"></div>
        <form class="admin-form" id="bookForm">
          <div class="form-row">
            <div class="form-group">
              <label for="title">书名 <span class="required">*</span></label>
              <input type="text" id="title" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="author">作者 <span class="required">*</span></label>
              <input type="text" id="author" class="form-input" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="category_id">分类</label>
              <select id="category_id" class="form-input">
                <option value="">请选择分类</option>
              </select>
            </div>
            <div class="form-group">
              <label for="rating">评分 (0–10)</label>
              <input type="number" id="rating" class="form-input" step="0.1" min="0" max="10" placeholder="如 8.5">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="publisher">出版社</label>
              <input type="text" id="publisher" class="form-input">
            </div>
            <div class="form-group">
              <label for="publish_date">出版日期</label>
              <input type="date" id="publish_date" class="form-input">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="pages">页数</label>
              <input type="number" id="pages" class="form-input" min="1" placeholder="如 302">
            </div>
            <div class="form-group">
              <label for="cover_url">封面图片路径</label>
              <input type="text" id="cover_url" class="form-input" placeholder="如 /images/covers/book-01.jpg">
            </div>
          </div>
          <div class="form-group">
            <label for="description">内容简介</label>
            <textarea id="description" class="form-input" rows="4" placeholder="图书简介…"></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="cancelBtn">取消</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">保 存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>⚠️ 确认删除</h3>
        <button class="modal-close" id="closeDeleteModal">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:20px;" id="deleteMessage">确定要删除该图书吗？此操作不可撤销。</p>
        <div class="modal-footer">
          <button class="btn btn-outline" id="cancelDeleteBtn">取消</button>
          <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
